server {
    listen 80;
    server_name _;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve Vite static assets directly (cached)
    location ^~ /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Admin SPA — try file then named fallback (avoids re-traversal of locations)
    location ^~ /admin {
        root /usr/share/nginx/html;
        try_files $uri $uri/ @spa;
    }

    # Named SPA fallback: serves index.html directly without location re-traversal
    location @spa {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # Suppress favicon.ico requests (browser fallback; actual favicon is inline SVG in index.html)
    location = /favicon.ico {
        return 204;
        access_log off;
    }

    # Everything else (short-code redirects) → proxy to backend
    location / {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
