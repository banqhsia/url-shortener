version: "3.9"

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - DB_PATH=/data/sqlite/urls.db
      - BASE_URL=${BASE_URL:-http://localhost}
      - HASHIDS_SALT=${HASHIDS_SALT:-change-me-in-production}
    volumes:
      - ./data/sqlite:/data/sqlite
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

networks:
  internal:
    driver: bridge
